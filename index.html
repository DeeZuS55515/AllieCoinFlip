<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Allie Coin Flip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      overflow: hidden;
    }

    /* ── Phone view ── */
    body.phone-view {
      align-items: center;
      padding: 20px;
    }
    body.phone-view #app {
      max-width: 390px;
      min-height: min(820px, 90dvh);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #1c1c1e, 0 0 0 12px #3a3a3c, 0 28px 70px rgba(0,0,0,0.85);
      overflow: hidden;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    #app {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 28px;
    }

    /* ── Header ── */
    .app-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(1.7rem, 5.5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, #ffe083, #e8b800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    #menuBtn {
      position: absolute;
      right: 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 1.6rem;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      transition: color 0.15s;
    }
    #menuBtn:hover { color: rgba(255,255,255,0.9); }

    /* ── Settings panel ── */
    #settings {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 14px;
    }

    .settings-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-row span { font-size: 0.95rem; font-weight: 700; }

    .toggle-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 900;
      padding: 5px 16px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-btn.on  { background: #e8b800; color: #1a1a2e; }
    .toggle-btn.off { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }

    /* ── Sound badge ── */
    .sound-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      min-height: 44px;
    }

    .sound-num {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 900;
      flex-shrink: 0;
      animation: badgePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .sound-label { font-size: 0.95rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; }

    .s1 .sound-num { background: #d4a017; color: #fff; box-shadow: 0 0 14px rgba(212,160,23,0.6); }
    .s1 .sound-label { color: #d4a017; }
    .s2 .sound-num { background: #8b0000; color: #fff; box-shadow: 0 0 14px rgba(139,0,0,0.7); }
    .s2 .sound-label { color: #ff5555; }
    .s3 .sound-num { background: #00897b; color: #fff; box-shadow: 0 0 14px rgba(0,137,123,0.6); }
    .s3 .sound-label { color: #00bfa5; }
    .s4 .sound-num { background: #1565c0; color: #fff; box-shadow: 0 0 14px rgba(21,101,192,0.6); }
    .s4 .sound-label { color: #64b5f6; }
    .s5 .sound-num { background: #6a1b9a; color: #fff; box-shadow: 0 0 14px rgba(106,27,154,0.7); }
    .s5 .sound-label { color: #ce93d8; }

    /* ── Coin ── */
    .coin-wrap {
      perspective: 600px;
      width: 210px; height: 210px;
      cursor: pointer;
      margin-bottom: 20px;
      flex-shrink: 0;
      overflow: visible;
    }

    #coinMover {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transform: translateY(0) scale(0.32);
    }

    .coin {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,0.6));
    }

    .coin-face, .coin-back {
      position: absolute; inset: 0;
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      user-select: none;
      gap: 4px;
    }

    .coin-face {
      background: radial-gradient(circle at 38% 32%, #fff5c0, #e8b800 42%, #a07000 80%, #6b4a00);
      box-shadow: inset 0 4px 10px rgba(255,255,200,0.6), inset 0 -5px 12px rgba(0,0,0,0.4);
    }

    .coin-back {
      background: radial-gradient(circle at 62% 32%, #ffffff, #d0d0d0 42%, #808080 80%, #404040);
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.65), inset 0 -5px 12px rgba(0,0,0,0.35);
      transform: rotateY(180deg);
    }

    .coin-symbol { font-size: 62px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .coin-word   { font-size: 1.15rem; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; }
    .coin-face .coin-word { color: #4a2e00; }
    .coin-back .coin-word { color: #1a1a1a; }

    /* ── Result ── */
    .result { min-height: 52px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .result-text { font-size: 2.2rem; font-weight: 900; letter-spacing: 0.04em; animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .result-heads { color: #e8b800; }
    .result-tails { color: #c0c0c0; }

    /* ── Flip button ── */
    .flip-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem; font-weight: 900; letter-spacing: 0.06em;
      padding: 13px 44px; border: none; border-radius: 999px;
      background: linear-gradient(135deg, #e8b800, #a07000);
      color: #fff; cursor: pointer;
      box-shadow: 0 4px 16px rgba(232,184,0,0.45);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.15s;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .flip-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(232,184,0,0.55); }
    .flip-btn:active:not(:disabled) { transform: translateY(0); }
    .flip-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Tally ── */
    .tally { display: flex; gap: 24px; margin-bottom: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
    .tally .heads-count { color: #e8b800; font-weight: 700; font-size: 1.05rem; }
    .tally .tails-count { color: #c0c0c0; font-weight: 700; font-size: 1.05rem; }

    /* ── History ── */
    .history { width: 100%; max-width: 340px; }
    .history-title {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px;
    }
    .history-items { display: flex; flex-wrap: wrap; gap: 5px; }
    .h-item {
      font-size: 1.1rem; line-height: 1;
      padding: 4px 5px; border-radius: 6px;
      background: rgba(255,255,255,0.06);
      animation: histIn 0.2s ease both;
    }
    .h-heads { color: #e8b800; }
    .h-tails { color: #c0c0c0; }

    @keyframes pop      { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes badgePop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes histIn   { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

<div id="app">

  <div class="app-header">
    <h1>Allie Coin Flip</h1>
    <button id="menuBtn" aria-label="Settings">☰</button>
  </div>

  <div id="settings" hidden>
    <div class="settings-title">Settings</div>
    <div class="settings-row">
      <span>Phone View</span>
      <button class="toggle-btn off" id="phoneToggle">Off</button>
    </div>
  </div>

  <div id="soundBadge" hidden class="sound-badge">
    <div class="sound-num" id="soundNum">1</div>
    <div class="sound-label" id="soundLabel">CLASSIC</div>
  </div>

  <div class="coin-wrap" id="coinWrap">
    <div id="coinMover">
      <div class="coin" id="coin">
        <div class="coin-face">
          <span class="coin-symbol">❤</span>
          <span class="coin-word">Heads</span>
        </div>
        <div class="coin-back">
          <span class="coin-symbol">★</span>
          <span class="coin-word">Tails</span>
        </div>
      </div>
    </div>
  </div>

  <div class="result" id="result"></div>

  <button class="flip-btn" id="flipBtn">Flip</button>

  <div class="tally" id="tally" hidden>
    <div>❤ <span class="heads-count" id="headsCount">0</span></div>
    <div>★ <span class="tails-count" id="tailsCount">0</span></div>
  </div>

  <div class="history" id="historyEl" hidden>
    <div class="history-title">Flip History</div>
    <div class="history-items" id="historyItems"></div>
  </div>

</div>

<script>
  const coinWrap    = document.getElementById('coinWrap');
  const coinMover   = document.getElementById('coinMover');
  const coin        = document.getElementById('coin');
  const flipBtn     = document.getElementById('flipBtn');
  const resultEl    = document.getElementById('result');
  const tallyEl     = document.getElementById('tally');
  const headsEl     = document.getElementById('headsCount');
  const tailsEl     = document.getElementById('tailsCount');
  const soundBadge  = document.getElementById('soundBadge');
  const soundNumEl  = document.getElementById('soundNum');
  const soundLblEl  = document.getElementById('soundLabel');
  const menuBtn     = document.getElementById('menuBtn');
  const settingsEl  = document.getElementById('settings');
  const phoneToggle = document.getElementById('phoneToggle');
  const historyEl   = document.getElementById('historyEl');
  const histItems   = document.getElementById('historyItems');

  let flipping = false, headsCount = 0, tailsCount = 0;
  let audioCtx = null;
  const history = [];

  // ── Settings ──
  let phoneView = localStorage.getItem('phoneView') === 'true';
  applyPhoneView();

  menuBtn.addEventListener('click', () => {
    settingsEl.hidden = !settingsEl.hidden;
  });

  phoneToggle.addEventListener('click', () => {
    phoneView = !phoneView;
    localStorage.setItem('phoneView', phoneView);
    applyPhoneView();
  });

  function applyPhoneView() {
    document.body.classList.toggle('phone-view', phoneView);
    phoneToggle.textContent = phoneView ? 'On' : 'Off';
    phoneToggle.className = 'toggle-btn ' + (phoneView ? 'on' : 'off');
  }

  // ── Audio ──
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function noise(ctx, dur) {
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    return src;
  }

  const SOUNDS = [
    { label: 'CLASSIC',  cls: 's1' },
    { label: 'POWER',    cls: 's2' },
    { label: 'WHIP',     cls: 's3' },
    { label: 'WIND',     cls: 's4' },
    { label: 'ELECTRIC', cls: 's5' },
  ];

  function playSound1(ctx, now) {
    const z = ctx.createOscillator(), zg = ctx.createGain();
    z.type = 'triangle'; z.frequency.setValueAtTime(200, now); z.frequency.exponentialRampToValueAtTime(2200, now + 0.14);
    zg.gain.setValueAtTime(0.5, now); zg.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
    z.connect(zg); zg.connect(ctx.destination); z.start(now); z.stop(now + 0.17);

    const w = noise(ctx, 0.9), wf = ctx.createBiquadFilter(), wg = ctx.createGain();
    wf.type = 'bandpass'; wf.frequency.setValueAtTime(1400, now); wf.frequency.linearRampToValueAtTime(280, now + 0.9); wf.Q.value = 2;
    wg.gain.setValueAtTime(0.06, now); wg.gain.linearRampToValueAtTime(0.45, now + 0.2); wg.gain.linearRampToValueAtTime(0, now + 0.9);
    w.connect(wf); wf.connect(wg); wg.connect(ctx.destination); w.start(now); w.stop(now + 0.92);

    const s = ctx.createOscillator(), sg = ctx.createGain();
    s.type = 'sawtooth'; s.frequency.setValueAtTime(300, now + 0.05); s.frequency.linearRampToValueAtTime(550, now + 0.45); s.frequency.linearRampToValueAtTime(300, now + 0.9);
    const lfo = ctx.createOscillator(), lg = ctx.createGain();
    lfo.frequency.setValueAtTime(32, now); lfo.frequency.linearRampToValueAtTime(5, now + 0.9); lg.gain.value = 0.65;
    lfo.connect(lg); lg.connect(sg.gain);
    sg.gain.setValueAtTime(0, now); sg.gain.linearRampToValueAtTime(0.2, now + 0.1); sg.gain.linearRampToValueAtTime(0.1, now + 0.8); sg.gain.linearRampToValueAtTime(0, now + 0.95);
    s.connect(sg); sg.connect(ctx.destination); lfo.start(now + 0.05); lfo.stop(now + 1.0); s.start(now + 0.05); s.stop(now + 0.98);

    const ca = now + 1.08;
    const cn = noise(ctx, 0.4), cf = ctx.createBiquadFilter(), cg = ctx.createGain();
    cf.type = 'bandpass'; cf.frequency.value = 4000; cf.Q.value = 10;
    cg.gain.setValueAtTime(1.1, ca); cg.gain.exponentialRampToValueAtTime(0.001, ca + 0.3);
    cn.connect(cf); cf.connect(cg); cg.connect(ctx.destination); cn.start(ca); cn.stop(ca + 0.42);
    const r = ctx.createOscillator(), rg = ctx.createGain();
    r.frequency.value = 2800; r.type = 'sine';
    rg.gain.setValueAtTime(0.14, ca); rg.gain.exponentialRampToValueAtTime(0.001, ca + 0.6);
    r.connect(rg); rg.connect(ctx.destination); r.start(ca); r.stop(ca + 0.65);
  }

  function playSound2(ctx, now) {
    const b = ctx.createOscillator(), bg = ctx.createGain();
    b.type = 'sine'; b.frequency.setValueAtTime(120, now); b.frequency.exponentialRampToValueAtTime(30, now + 0.25);
    bg.gain.setValueAtTime(0.7, now); bg.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    b.connect(bg); bg.connect(ctx.destination); b.start(now); b.stop(now + 0.3);

    const w = noise(ctx, 0.9), wf = ctx.createBiquadFilter(), wg = ctx.createGain();
    wf.type = 'lowpass'; wf.frequency.setValueAtTime(600, now); wf.frequency.linearRampToValueAtTime(100, now + 0.9);
    wg.gain.setValueAtTime(0.1, now); wg.gain.linearRampToValueAtTime(0.6, now + 0.18); wg.gain.linearRampToValueAtTime(0, now + 0.9);
    w.connect(wf); wf.connect(wg); wg.connect(ctx.destination); w.start(now); w.stop(now + 0.92);

    const rr = ctx.createOscillator(), rrg = ctx.createGain();
    rr.type = 'sawtooth'; rr.frequency.setValueAtTime(55, now + 0.05); rr.frequency.linearRampToValueAtTime(80, now + 0.5); rr.frequency.linearRampToValueAtTime(40, now + 0.9);
    rrg.gain.setValueAtTime(0, now); rrg.gain.linearRampToValueAtTime(0.3, now + 0.1); rrg.gain.linearRampToValueAtTime(0, now + 0.9);
    rr.connect(rrg); rrg.connect(ctx.destination); rr.start(now + 0.05); rr.stop(now + 0.92);

    const ta = now + 1.08;
    const t = ctx.createOscillator(), tg = ctx.createGain();
    t.type = 'sine'; t.frequency.setValueAtTime(140, ta); t.frequency.exponentialRampToValueAtTime(25, ta + 0.25);
    tg.gain.setValueAtTime(1.2, ta); tg.gain.exponentialRampToValueAtTime(0.001, ta + 0.3);
    t.connect(tg); tg.connect(ctx.destination); t.start(ta); t.stop(ta + 0.32);

    const cn = noise(ctx, 0.35), cf = ctx.createBiquadFilter(), cg = ctx.createGain();
    cf.type = 'bandpass'; cf.frequency.value = 1800; cf.Q.value = 4;
    cg.gain.setValueAtTime(0.8, ta); cg.gain.exponentialRampToValueAtTime(0.001, ta + 0.3);
    cn.connect(cf); cf.connect(cg); cg.connect(ctx.destination); cn.start(ta); cn.stop(ta + 0.37);
  }

  function playSound3(ctx, now) {
    const wc = noise(ctx, 0.06), wcf = ctx.createBiquadFilter(), wcg = ctx.createGain();
    wcf.type = 'highpass'; wcf.frequency.value = 3000;
    wcg.gain.setValueAtTime(1.4, now); wcg.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    wc.connect(wcf); wcf.connect(wcg); wcg.connect(ctx.destination); wc.start(now); wc.stop(now + 0.07);

    const sw = ctx.createOscillator(), swg = ctx.createGain();
    sw.type = 'sawtooth'; sw.frequency.setValueAtTime(400, now); sw.frequency.exponentialRampToValueAtTime(4000, now + 0.08);
    swg.gain.setValueAtTime(0.35, now); swg.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    sw.connect(swg); swg.connect(ctx.destination); sw.start(now); sw.stop(now + 0.11);

    const h = noise(ctx, 0.88), hf = ctx.createBiquadFilter(), hg = ctx.createGain();
    hf.type = 'bandpass'; hf.frequency.setValueAtTime(5000, now + 0.05); hf.frequency.linearRampToValueAtTime(2500, now + 0.9); hf.Q.value = 1.5;
    hg.gain.setValueAtTime(0.04, now + 0.05); hg.gain.linearRampToValueAtTime(0.4, now + 0.15); hg.gain.linearRampToValueAtTime(0, now + 0.9);
    h.connect(hf); hf.connect(hg); hg.connect(ctx.destination); h.start(now + 0.05); h.stop(now + 0.92);

    const sp = ctx.createOscillator(), spg = ctx.createGain();
    sp.type = 'sine'; sp.frequency.setValueAtTime(3000, now + 0.05); sp.frequency.linearRampToValueAtTime(1800, now + 0.9);
    const lfo = ctx.createOscillator(), lg = ctx.createGain();
    lfo.frequency.setValueAtTime(55, now); lfo.frequency.linearRampToValueAtTime(8, now + 0.9); lg.gain.value = 0.8;
    lfo.connect(lg); lg.connect(spg.gain);
    spg.gain.setValueAtTime(0, now); spg.gain.linearRampToValueAtTime(0.12, now + 0.08); spg.gain.linearRampToValueAtTime(0, now + 0.9);
    sp.connect(spg); spg.connect(ctx.destination); lfo.start(now + 0.05); lfo.stop(now + 0.95); sp.start(now + 0.05); sp.stop(now + 0.92);

    const ta = now + 1.08;
    const tn = noise(ctx, 0.12), tf = ctx.createBiquadFilter(), tg = ctx.createGain();
    tf.type = 'bandpass'; tf.frequency.value = 6000; tf.Q.value = 15;
    tg.gain.setValueAtTime(1.0, ta); tg.gain.exponentialRampToValueAtTime(0.001, ta + 0.1);
    tn.connect(tf); tf.connect(tg); tg.connect(ctx.destination); tn.start(ta); tn.stop(ta + 0.13);
  }

  function playSound4(ctx, now) {
    [
      { f0: 800,  f1: 150, Q: 1.8, g0: 0.55, peak: 0.25 },
      { f0: 2000, f1: 500, Q: 2.5, g0: 0.3,  peak: 0.18 },
      { f0: 300,  f1: 80,  Q: 1.2, g0: 0.4,  peak: 0.3  },
    ].forEach(p => {
      const wn = noise(ctx, 0.95), wf = ctx.createBiquadFilter(), wg = ctx.createGain();
      wf.type = 'bandpass'; wf.frequency.setValueAtTime(p.f0, now); wf.frequency.linearRampToValueAtTime(p.f1, now + 0.95); wf.Q.value = p.Q;
      wg.gain.setValueAtTime(0.02, now); wg.gain.linearRampToValueAtTime(p.g0, now + p.peak); wg.gain.linearRampToValueAtTime(0, now + 0.95);
      wn.connect(wf); wf.connect(wg); wg.connect(ctx.destination); wn.start(now); wn.stop(now + 0.97);
    });

    const ta = now + 1.08;
    const wn = noise(ctx, 0.3), wf = ctx.createBiquadFilter(), wg = ctx.createGain();
    wf.type = 'lowpass'; wf.frequency.setValueAtTime(300, ta); wf.frequency.exponentialRampToValueAtTime(60, ta + 0.25);
    wg.gain.setValueAtTime(0.7, ta); wg.gain.exponentialRampToValueAtTime(0.001, ta + 0.28);
    wn.connect(wf); wf.connect(wg); wg.connect(ctx.destination); wn.start(ta); wn.stop(ta + 0.32);

    const r = ctx.createOscillator(), rg = ctx.createGain();
    r.type = 'sine'; r.frequency.value = 320;
    rg.gain.setValueAtTime(0.06, ta); rg.gain.exponentialRampToValueAtTime(0.001, ta + 0.4);
    r.connect(rg); rg.connect(ctx.destination); r.start(ta); r.stop(ta + 0.42);
  }

  function playSound5(ctx, now) {
    const mod = ctx.createOscillator(), modG = ctx.createGain();
    const car = ctx.createOscillator(), carG = ctx.createGain();
    mod.frequency.setValueAtTime(880, now); mod.frequency.exponentialRampToValueAtTime(60, now + 0.15);
    modG.gain.setValueAtTime(800, now); modG.gain.exponentialRampToValueAtTime(10, now + 0.15);
    mod.connect(modG); modG.connect(car.frequency);
    car.type = 'sine'; car.frequency.setValueAtTime(440, now);
    carG.gain.setValueAtTime(0.5, now); carG.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    car.connect(carG); carG.connect(ctx.destination);
    mod.start(now); mod.stop(now + 0.18); car.start(now); car.stop(now + 0.18);

    const b = ctx.createOscillator(), bg = ctx.createGain();
    b.type = 'square'; b.frequency.setValueAtTime(220, now + 0.1); b.frequency.linearRampToValueAtTime(440, now + 0.5); b.frequency.linearRampToValueAtTime(180, now + 0.9);
    const lfo = ctx.createOscillator(), lg = ctx.createGain();
    lfo.frequency.setValueAtTime(40, now); lfo.frequency.linearRampToValueAtTime(6, now + 0.9); lg.gain.value = 0.7;
    lfo.connect(lg); lg.connect(bg.gain);
    bg.gain.setValueAtTime(0, now + 0.1); bg.gain.linearRampToValueAtTime(0.14, now + 0.18); bg.gain.linearRampToValueAtTime(0, now + 0.9);
    b.connect(bg); bg.connect(ctx.destination); lfo.start(now + 0.1); lfo.stop(now + 0.92); b.start(now + 0.1); b.stop(now + 0.92);

    const en = noise(ctx, 0.8), ef = ctx.createBiquadFilter(), eg = ctx.createGain();
    ef.type = 'bandpass'; ef.frequency.setValueAtTime(2000, now + 0.05); ef.frequency.linearRampToValueAtTime(4500, now + 0.4); ef.frequency.linearRampToValueAtTime(800, now + 0.85); ef.Q.value = 5;
    eg.gain.setValueAtTime(0.03, now + 0.05); eg.gain.linearRampToValueAtTime(0.3, now + 0.2); eg.gain.linearRampToValueAtTime(0, now + 0.85);
    en.connect(ef); ef.connect(eg); eg.connect(ctx.destination); en.start(now + 0.05); en.stop(now + 0.87);

    const ta = now + 1.08;
    const zap = ctx.createOscillator(), zapg = ctx.createGain();
    zap.type = 'square'; zap.frequency.setValueAtTime(600, ta); zap.frequency.exponentialRampToValueAtTime(60, ta + 0.08);
    zapg.gain.setValueAtTime(0.8, ta); zapg.gain.exponentialRampToValueAtTime(0.001, ta + 0.1);
    zap.connect(zapg); zapg.connect(ctx.destination); zap.start(ta); zap.stop(ta + 0.12);

    const blip = ctx.createOscillator(), blipg = ctx.createGain();
    blip.frequency.value = 3200; blip.type = 'sine';
    blipg.gain.setValueAtTime(0.18, ta); blipg.gain.exponentialRampToValueAtTime(0.001, ta + 0.18);
    blip.connect(blipg); blipg.connect(ctx.destination); blip.start(ta); blip.stop(ta + 0.2);
  }

  const soundFns = [playSound1, playSound2, playSound3, playSound4, playSound5];

  function addToHistory(isHeads) {
    history.unshift(isHeads);
    if (history.length > 30) history.pop();
    histItems.innerHTML = history.map(h =>
      `<span class="h-item ${h ? 'h-heads' : 'h-tails'}">${h ? '❤' : '★'}</span>`
    ).join('');
    historyEl.hidden = false;
  }

  function flip() {
    if (flipping) return;
    flipping = true;
    flipBtn.disabled = true;
    resultEl.innerHTML = '';

    const isHeads = Math.random() < 0.5;
    const si = Math.floor(Math.random() * 5);

    try { soundFns[si](getCtx(), getCtx().currentTime); } catch(e) {}

    // Show sound badge
    const sd = SOUNDS[si];
    soundNumEl.textContent = si + 1;
    soundLblEl.textContent = sd.label;
    soundBadge.className = 'sound-badge ' + sd.cls;
    soundBadge.hidden = false;
    soundBadge.style.animation = 'none';
    void soundBadge.offsetHeight;
    soundBadge.style.animation = '';

    // Phase 1: small → fly up
    coinMover.style.transition = 'none';
    coinMover.style.transform = 'translateY(0) scale(0.32)';
    coin.style.transition = 'none';
    coin.style.transform = 'rotateY(0deg)';
    void coinMover.offsetHeight;

    const P1 = 550, SPIN1 = 1440;
    coinMover.style.transition = `transform ${P1}ms cubic-bezier(0.4, 0, 1, 1)`;
    coinMover.style.transform = 'translateY(-130vh) scale(2.2)';
    coin.style.transition = `transform ${P1}ms linear`;
    coin.style.transform = `rotateY(${SPIN1}deg)`;

    // Phase 2: land
    setTimeout(() => {
      const P2 = 520;
      const finalDeg = SPIN1 + 1080 + (isHeads ? 0 : 180);
      coinMover.style.transition = `transform ${P2}ms cubic-bezier(0.16, 1.4, 0.5, 1)`;
      coinMover.style.transform = 'translateY(0) scale(1)';
      coin.style.transition = `transform ${P2}ms linear`;
      coin.style.transform = `rotateY(${finalDeg}deg)`;

      setTimeout(() => {
        const cls = isHeads ? 'result-heads' : 'result-tails';
        resultEl.innerHTML = `<div class="result-text ${cls}">${isHeads ? 'Heads!' : 'Tails!'}</div>`;

        if (isHeads) headsCount++; else tailsCount++;
        headsEl.textContent = headsCount;
        tailsEl.textContent = tailsCount;
        tallyEl.hidden = false;

        addToHistory(isHeads);

        flipping = false;
        flipBtn.disabled = false;
        flipBtn.textContent = 'Flip Again';
      }, P2 + 30);
    }, P1 + 40);
  }

  flipBtn.addEventListener('click', flip);
  coinWrap.addEventListener('click', flip);
</script>
