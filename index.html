<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>❤🕉 Allie Coin Flip</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕉</text></svg>" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e8b800" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { display: none; }

    body.phone-view {
      align-items: center;
      padding: 20px;
    }
    body.phone-view #app {
      max-width: 390px;
      min-height: min(820px, 90dvh);
      max-height: 90dvh;
      border-radius: 40px;
      box-shadow: 0 0 0 10px #1c1c1e, 0 0 0 12px #3a3a3c, 0 28px 70px rgba(0,0,0,0.85);
      overflow-y: auto;
      scrollbar-width: none;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    body.phone-view #app::-webkit-scrollbar { display: none; }

    #app {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 36px;
    }

    /* ── Header ── */
    .app-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1001;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(1.7rem, 5.5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, #ffe083, #e8b800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    #menuBtn {
      position: absolute;
      right: 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 1.55rem;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      transition: color 0.15s, transform 0.2s;
    }
    #menuBtn:hover { color: rgba(255,255,255,0.9); }
    #menuBtn.open { transform: rotate(90deg); color: rgba(255,255,255,0.85); }

    /* ── Settings pop-out ── */
    #settings {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%) scale(0.82) translateY(-10px);
      width: 230px;
      background: #0f2040;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px 18px;
      z-index: 9999;
      transform-origin: top right;
      transform: scale(0.82) translateY(-10px);
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      transition: transform 0.22s cubic-bezier(0.34, 1.45, 0.64, 1), opacity 0.18s ease;
    }
    #settings.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .settings-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 12px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }
    .settings-row + .settings-row { border-top: 1px solid rgba(255,255,255,0.06); }
    .settings-row span { font-size: 0.92rem; font-weight: 700; }

    .toggle-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem; font-weight: 900;
      padding: 5px 16px; border: none; border-radius: 999px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
      min-width: 48px;
    }
    .toggle-btn.on  { background: #e8b800; color: #1a1a2e; }
    .toggle-btn.off { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.65); }

    /* ── Coin ── */
    .coin-wrap {
      perspective: 900px;
      width: 210px; height: 210px;
      cursor: pointer;
      margin-bottom: 18px;
      flex-shrink: 0;
      overflow: visible;
      position: relative;
      z-index: 999;
    }

    #coinMover {
      width: 100%; height: 100%;
      transform: translateY(0) scale(1);
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .coin {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .coin-face {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: url('sounds/coin front.jpg') center/cover no-repeat;
      transform: translateZ(9px);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      user-select: none;
      pointer-events: none;
    }

    #coinEdge { pointer-events: none; }

    .edge-seg {
      position: absolute;
      left: 50%; top: 50%;
      height: 18px;
      margin-top: -9px;
      background: linear-gradient(to bottom,
        #f0d060 0%, #c8a200 18%, #7a5800 35%,
        #c8a200 50%, #7a5800 65%, #c8a200 82%, #f0d060 100%);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      pointer-events: none;
    }

    /* ── Result ── */
    .result { min-height: 50px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .result-text { font-size: 2.2rem; font-weight: 900; letter-spacing: 0.04em; animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .result-heads { color: #e8b800; }
    .result-tails { color: #c8c8c8; }

    /* ── Flip button ── */
    .flip-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem; font-weight: 900; letter-spacing: 0.06em;
      padding: 13px 44px; border: none; border-radius: 999px;
      background: linear-gradient(135deg, #e8b800, #a07000);
      color: #fff; cursor: pointer;
      box-shadow: 0 4px 16px rgba(232,184,0,0.45);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.15s;
      text-transform: uppercase; margin-bottom: 14px;
    }
    .flip-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(232,184,0,0.55); }
    .flip-btn:active:not(:disabled) { transform: translateY(0); }
    .flip-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Tally ── */
    .tally { display: flex; gap: 24px; margin-bottom: 18px; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
    .tally .heads-count { color: #e8b800; font-weight: 700; font-size: 1.05rem; }
    .tally .tails-count { color: #c8c8c8; font-weight: 700; font-size: 1.05rem; }

    /* ── History ── */
    .history {
      width: 100%;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.4s ease;
      margin-top: 0;
    }
    .history.visible {
      max-height: 9999px;
      opacity: 1;
      margin-top: 12px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .history-title {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
    }
    .history-clear {
      background: none; border: none; cursor: pointer;
      font-size: 0.68rem; color: rgba(255,255,255,0.25);
      font-family: 'Nunito', sans-serif; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 0.15s; padding: 0;
    }
    .history-clear:hover { color: rgba(255,255,255,0.6); }
    .history-items { display: flex; flex-wrap: wrap; gap: 5px; }
    .h-item {
      font-size: 1.1rem; line-height: 1;
      padding: 4px 5px; border-radius: 6px;
      background: rgba(255,255,255,0.06);
    }
    .h-heads { color: #e8b800; }
    .h-tails { color: #c8c8c8; }

    @keyframes pop  { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

<div id="app">

  <div class="app-header">
    <h1>Allie Coin Flip</h1>
    <button id="menuBtn" aria-label="Settings">☰</button>
  </div>

  <div class="coin-wrap" id="coinWrap">
    <div id="coinMover">
      <div class="coin" id="coin">
        <div class="coin-face" id="coinFace"></div>
        <div id="coinEdge"></div>
      </div>
    </div>
  </div>

  <div class="result" id="result"></div>

  <button class="flip-btn" id="flipBtn">Flip</button>

  <div class="tally" id="tally" style="display:none">
    <div>❤ <span class="heads-count" id="headsCount">0</span></div>
    <div>★ <span class="tails-count" id="tailsCount">0</span></div>
  </div>

  <div class="history" id="historyEl">
    <div class="history-header">
      <div class="history-title">Flip History</div>
      <button class="history-clear" id="historyClear">Clear</button>
    </div>
    <div class="history-items" id="historyItems"></div>
  </div>

</div>

<div id="settings">
  <div class="settings-title">Settings</div>
  <div class="settings-row"><span>Sound</span><button class="toggle-btn" id="soundToggle">On</button></div>
  <div class="settings-row"><span>Phone View</span><button class="toggle-btn" id="phoneToggle">Off</button></div>
  <div class="settings-row"><span>Instant Results</span><button class="toggle-btn" id="instantToggle">Off</button></div>
  <div class="settings-row">
    <span>❤ Heads / 🕉 Tails</span>
    <span id="statsPct" style="font-size:0.85rem;color:rgba(255,255,255,0.55);font-weight:700;">—</span>
  </div>
</div>

<script>
  const coinWrap    = document.getElementById('coinWrap');
  const coinMover   = document.getElementById('coinMover');
  const coin        = document.getElementById('coin');
  const coinFace    = document.getElementById('coinFace');
  const flipBtn     = document.getElementById('flipBtn');
  const resultEl    = document.getElementById('result');
  const tallyEl     = document.getElementById('tally');
  const headsEl     = document.getElementById('headsCount');
  const tailsEl     = document.getElementById('tailsCount');
  const menuBtn     = document.getElementById('menuBtn');
  const settingsEl  = document.getElementById('settings');
  const soundToggle = document.getElementById('soundToggle');
  const phoneToggle = document.getElementById('phoneToggle');
  const historyEl   = document.getElementById('historyEl');
  const histItems   = document.getElementById('historyItems');
  const historyClear= document.getElementById('historyClear');
  const statsPct     = document.getElementById('statsPct');
  const instantToggle= document.getElementById('instantToggle');

  let flipping = false, headsCount = 0, tailsCount = 0;
  let audioCtx = null;
  const flipHistory = [];

  let soundEnabled  = localStorage.getItem('soundEnabled')  !== 'false';
  let phoneView     = localStorage.getItem('phoneView')     === 'true';
  let instantMode   = localStorage.getItem('instantMode')   === 'true';

  applySound(); applyPhoneView(); applyInstant();

  function applySound() {
    soundToggle.textContent = soundEnabled ? 'On' : 'Off';
    soundToggle.className = 'toggle-btn ' + (soundEnabled ? 'on' : 'off');
  }
  function applyPhoneView() {
    document.body.classList.toggle('phone-view', phoneView);
    phoneToggle.textContent = phoneView ? 'On' : 'Off';
    phoneToggle.className = 'toggle-btn ' + (phoneView ? 'on' : 'off');
  }
  function applyInstant() {
    instantToggle.textContent = instantMode ? 'On' : 'Off';
    instantToggle.className = 'toggle-btn ' + (instantMode ? 'on' : 'off');
  }

  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const open = settingsEl.classList.toggle('open');
    menuBtn.classList.toggle('open', open);
  });

  document.addEventListener('click', (e) => {
    if (!settingsEl.contains(e.target) && e.target !== menuBtn) {
      settingsEl.classList.remove('open');
      menuBtn.classList.remove('open');
    }
  });

  soundToggle.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    localStorage.setItem('soundEnabled', soundEnabled);
    applySound();
  });
  phoneToggle.addEventListener('click', () => {
    phoneView = !phoneView;
    localStorage.setItem('phoneView', phoneView);
    applyPhoneView();
  });
  instantToggle.addEventListener('click', () => {
    instantMode = !instantMode;
    localStorage.setItem('instantMode', instantMode);
    applyInstant();
  });
  historyClear.addEventListener('click', () => {
    flipHistory.length = 0;
    headsCount = 0; tailsCount = 0;
    headsEl.textContent = '0'; tailsEl.textContent = '0';
    histItems.innerHTML = '';
    statsPct.textContent = '—';
    historyEl.classList.remove('visible');
    tallyEl.style.display = 'none';
    resultEl.innerHTML = '';
    flipBtn.textContent = 'Flip';
  });

  // ── Audio ──
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function noise(ctx, dur) {
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    return src;
  }

  function playWind(ctx, now) {
    const sub = ctx.createOscillator(), subg = ctx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(95, now); sub.frequency.linearRampToValueAtTime(32, now + 0.9);
    subg.gain.setValueAtTime(0, now); subg.gain.linearRampToValueAtTime(0.55, now + 0.18); subg.gain.linearRampToValueAtTime(0, now + 0.9);
    sub.connect(subg); subg.connect(ctx.destination); sub.start(now); sub.stop(now + 0.92);

    const rum = ctx.createOscillator(), rumg = ctx.createGain();
    rum.type = 'sawtooth'; rum.frequency.setValueAtTime(48, now + 0.05); rum.frequency.linearRampToValueAtTime(22, now + 0.85);
    rumg.gain.setValueAtTime(0, now); rumg.gain.linearRampToValueAtTime(0.2, now + 0.15); rumg.gain.linearRampToValueAtTime(0, now + 0.88);
    rum.connect(rumg); rumg.connect(ctx.destination); rum.start(now + 0.05); rum.stop(now + 0.9);

    [
      { f0: 320,  f1: 55,  Q: 1.6, g0: 0.55, peak: 0.2  },
      { f0: 110,  f1: 28,  Q: 1.3, g0: 0.45, peak: 0.28 },
      { f0: 650,  f1: 160, Q: 2.2, g0: 0.2,  peak: 0.14 },
    ].forEach(p => {
      const wn = noise(ctx, 0.95), wf = ctx.createBiquadFilter(), wg = ctx.createGain();
      wf.type = 'bandpass'; wf.frequency.setValueAtTime(p.f0, now); wf.frequency.linearRampToValueAtTime(p.f1, now + 0.95); wf.Q.value = p.Q;
      wg.gain.setValueAtTime(0.02, now); wg.gain.linearRampToValueAtTime(p.g0, now + p.peak); wg.gain.linearRampToValueAtTime(0, now + 0.95);
      wn.connect(wf); wf.connect(wg); wg.connect(ctx.destination); wn.start(now); wn.stop(now + 0.97);
    });

    const ta = now + 1.08;
    const t = ctx.createOscillator(), tg = ctx.createGain();
    t.type = 'sine'; t.frequency.setValueAtTime(85, ta); t.frequency.exponentialRampToValueAtTime(18, ta + 0.5);
    tg.gain.setValueAtTime(1.3, ta); tg.gain.exponentialRampToValueAtTime(0.001, ta + 0.5);
    t.connect(tg); tg.connect(ctx.destination); t.start(ta); t.stop(ta + 0.55);

    const wn2 = noise(ctx, 0.4), wf2 = ctx.createBiquadFilter(), wg2 = ctx.createGain();
    wf2.type = 'lowpass'; wf2.frequency.setValueAtTime(140, ta); wf2.frequency.exponentialRampToValueAtTime(28, ta + 0.38);
    wg2.gain.setValueAtTime(0.9, ta); wg2.gain.exponentialRampToValueAtTime(0.001, ta + 0.42);
    wn2.connect(wf2); wf2.connect(wg2); wg2.connect(ctx.destination); wn2.start(ta); wn2.stop(ta + 0.45);
  }

  function addToHistory(isHeads) {
    flipHistory.unshift(isHeads);
    histItems.innerHTML = flipHistory.map(h =>
      `<span class="h-item ${h ? 'h-heads' : 'h-tails'}">${h ? '❤' : '🕉'}</span>`
    ).join('');
    historyEl.classList.add('visible');
    const total = headsCount + tailsCount;
    const hp = Math.round(headsCount / total * 100);
    statsPct.textContent = `❤ ${hp}% / 🕉 ${100 - hp}%`;
  }

  function settle(isHeads) {
    coinFace.style.background = isHeads
      ? "url('sounds/coin front.jpg') center/cover no-repeat"
      : "url('sounds/coin back.jpg') center/cover no-repeat";
    const cls = isHeads ? 'result-heads' : 'result-tails';
    resultEl.innerHTML = `<div class="result-text ${cls}">${isHeads ? 'Heads!' : 'Tails!'}</div>`;
    if (isHeads) headsCount++; else tailsCount++;
    headsEl.textContent = headsCount;
    tailsEl.textContent = tailsCount;
    tallyEl.style.display = 'flex';
    addToHistory(isHeads);
    flipping = false;
    flipBtn.disabled = false;
    flipBtn.textContent = 'Flip Again';
  }

  function flip() {
    if (flipping) return;
    flipping = true;
    flipBtn.disabled = true;
    resultEl.innerHTML = '';

    const buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    const isHeads = buf[0] % 2 === 0;

    if (instantMode) {
      coin.style.transition = 'none';
      coin.style.transform = 'rotateY(0deg)';
      coinMover.style.transition = 'none';
      coinMover.style.transform = 'translateY(0) scale(1)';
      settle(isHeads);
      return;
    }

    if (soundEnabled) {
      try { const ctx = getCtx(); playWind(ctx, ctx.currentTime); } catch(e) {}
    }

    coinMover.style.transition = 'none';
    coinMover.style.transform = 'translateY(0) scale(0.32)';
    coin.style.transition = 'none';
    coin.style.transform = 'rotateY(0deg)';
    void coinMover.offsetHeight;

    const P1 = 950, SPIN1 = 1440;
    coinMover.style.transition = `transform ${P1}ms cubic-bezier(0.4, 0, 1, 1)`;
    coinMover.style.transform = 'translateY(-130vh) scale(2.2)';
    coin.style.transition = `transform ${P1}ms linear`;
    coin.style.transform = `rotateY(${SPIN1}deg)`;

    setTimeout(() => {
      const P2 = 850;
      const finalDeg = SPIN1 + 1080;
      coinMover.style.transition = `transform ${P2}ms cubic-bezier(0.16, 1.4, 0.5, 1)`;
      coinMover.style.transform = 'translateY(0) scale(1)';
      coin.style.transition = `transform ${P2}ms linear`;
      coin.style.transform = `rotateY(${finalDeg}deg)`;

      setTimeout(() => settle(isHeads), P2 + 30);
    }, P1 + 40);
  }

  flipBtn.addEventListener('click', flip);
  coinWrap.addEventListener('click', flip);

  // Build 3D coin edge cylinder
  (function() {
    const R = 105, N = 60;
    const segW = Math.ceil(2 * R * Math.sin(Math.PI / N)) + 1;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < N; i++) {
      const s = document.createElement('div');
      s.className = 'edge-seg';
      s.style.width = segW + 'px';
      s.style.marginLeft = (-segW / 2) + 'px';
      s.style.transform = `rotateY(${i * (360 / N)}deg) translateZ(${R}px)`;
      frag.appendChild(s);
    }
    document.getElementById('coinEdge').appendChild(frag);
  })();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>

</body>
</html>
