<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Allie Coin Flip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      padding: 24px 16px;
      overflow: hidden;
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 900;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffe083, #e8b800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 48px;
      text-align: center;
      letter-spacing: 0.06em;
    }

    /* ── Coin ── */
    .coin-wrap {
      /* perspective container — overflow visible so coin can fly off screen */
      perspective: 600px;
      width: 220px;
      height: 220px;
      cursor: pointer;
      margin-bottom: 36px;
      flex-shrink: 0;
      overflow: visible;
    }

    /* mover: handles translateY + scale */
    #coinMover {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transform: translateY(0) scale(0.32);
    }

    /* coin: handles rotateY only */
    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.6));
    }

    .coin-face, .coin-back {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      user-select: none;
    }

    .coin-face {
      background: radial-gradient(circle at 38% 32%, #fff5c0, #e8b800 42%, #a07000 80%, #6b4a00);
      box-shadow: inset 0 4px 10px rgba(255,255,200,0.6), inset 0 -5px 12px rgba(0,0,0,0.4);
    }

    .coin-back {
      background: radial-gradient(circle at 62% 32%, #ffffff, #d0d0d0 42%, #808080 80%, #404040);
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.65), inset 0 -5px 12px rgba(0,0,0,0.35);
      transform: rotateY(180deg);
    }

    .coin-symbol {
      font-size: 88px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .coin-label {
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.22em;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .coin-face .coin-label { color: #5a3800; }
    .coin-back .coin-label { color: #2a2a2a; }

    /* ── Result ── */
    .result {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .result-text {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .result-heads { color: #e8b800; }
    .result-tails { color: #b8b8b8; }

    /* ── Button ── */
    .flip-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      padding: 14px 48px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #e8b800, #a07000);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(232,184,0,0.45);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.15s;
      text-transform: uppercase;
    }

    .flip-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(232,184,0,0.55);
    }

    .flip-btn:active:not(:disabled) { transform: translateY(0); }
    .flip-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Tally ── */
    .tally {
      display: flex;
      gap: 28px;
      margin-top: 36px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    .tally .heads-count { color: #e8b800; font-weight: 700; font-size: 1.1rem; }
    .tally .tails-count { color: #b8b8b8; font-weight: 700; font-size: 1.1rem; }

    @keyframes pop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

  <h1>Allie Coin Flip</h1>
  <div class="subtitle">tap the coin — or the button</div>

  <div class="coin-wrap" id="coinWrap">
    <div id="coinMover">
      <div class="coin" id="coin">
        <div class="coin-face">
          <span class="coin-symbol">❤</span>
          <span class="coin-label">Heads</span>
        </div>
        <div class="coin-back">
          <span class="coin-symbol">★</span>
          <span class="coin-label">Tails</span>
        </div>
      </div>
    </div>
  </div>

  <div class="result" id="result"></div>

  <button class="flip-btn" id="flipBtn">Flip</button>

  <div class="tally" id="tally" style="display:none">
    <div>❤ <span class="heads-count" id="headsCount">0</span></div>
    <div>★ <span class="tails-count" id="tailsCount">0</span></div>
  </div>

  <script>
    const coinWrap  = document.getElementById('coinWrap');
    const coinMover = document.getElementById('coinMover');
    const coin      = document.getElementById('coin');
    const flipBtn   = document.getElementById('flipBtn');
    const resultEl  = document.getElementById('result');
    const tally     = document.getElementById('tally');
    const headsEl   = document.getElementById('headsCount');
    const tailsEl   = document.getElementById('tailsCount');

    let flipping = false;
    let headsCount = 0, tailsCount = 0;
    let audioCtx = null;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playCoinSound() {
      try {
        const ctx = getCtx();
        const now = ctx.currentTime;

        // ── Launch zing (sharp attack upward sweep) ──
        const zing = ctx.createOscillator();
        const zingGain = ctx.createGain();
        zing.type = 'triangle';
        zing.frequency.setValueAtTime(180, now);
        zing.frequency.exponentialRampToValueAtTime(1800, now + 0.12);
        zingGain.gain.setValueAtTime(0.4, now);
        zingGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        zing.connect(zingGain);
        zingGain.connect(ctx.destination);
        zing.start(now);
        zing.stop(now + 0.15);

        // ── Air whoosh (noise through sweeping bandpass) ──
        const whooshDur = 0.85;
        const wBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * whooshDur), ctx.sampleRate);
        const wd = wBuf.getChannelData(0);
        for (let i = 0; i < wd.length; i++) wd[i] = Math.random() * 2 - 1;
        const whoosh = ctx.createBufferSource();
        whoosh.buffer = wBuf;
        const wbpf = ctx.createBiquadFilter();
        wbpf.type = 'bandpass';
        wbpf.frequency.setValueAtTime(1200, now);
        wbpf.frequency.linearRampToValueAtTime(300, now + whooshDur);
        wbpf.Q.value = 2.5;
        const wGain = ctx.createGain();
        wGain.gain.setValueAtTime(0.05, now);
        wGain.gain.linearRampToValueAtTime(0.35, now + 0.25);
        wGain.gain.linearRampToValueAtTime(0, now + whooshDur);
        whoosh.connect(wbpf);
        wbpf.connect(wGain);
        wGain.connect(ctx.destination);
        whoosh.start(now);
        whoosh.stop(now + whooshDur);

        // ── Metallic spin (sawtooth + tremolo for flipping wobble) ──
        const spinOsc = ctx.createOscillator();
        const spinGain = ctx.createGain();
        spinOsc.type = 'sawtooth';
        spinOsc.frequency.setValueAtTime(280, now + 0.05);
        spinOsc.frequency.linearRampToValueAtTime(520, now + 0.45);
        spinOsc.frequency.linearRampToValueAtTime(280, now + 0.9);
        // Tremolo — makes the "rrrr" spin sound
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();
        lfo.frequency.setValueAtTime(28, now);   // fast spin
        lfo.frequency.linearRampToValueAtTime(6, now + 0.9); // slows as it falls
        lfoGain.gain.value = 0.6;
        lfo.connect(lfoGain);
        lfoGain.connect(spinGain.gain);
        lfo.start(now + 0.05);
        lfo.stop(now + 1.1);
        spinGain.gain.setValueAtTime(0, now);
        spinGain.gain.linearRampToValueAtTime(0.18, now + 0.12);
        spinGain.gain.linearRampToValueAtTime(0.1, now + 0.8);
        spinGain.gain.linearRampToValueAtTime(0, now + 0.95);
        spinOsc.connect(spinGain);
        spinGain.connect(ctx.destination);
        spinOsc.start(now + 0.05);
        spinOsc.stop(now + 1.0);

        // ── Heavy metallic CLANK on landing ──
        const clankAt = now + 1.08;
        const cBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.5), ctx.sampleRate);
        const cd = cBuf.getChannelData(0);
        for (let i = 0; i < cd.length; i++) cd[i] = Math.random() * 2 - 1;
        const clank = ctx.createBufferSource();
        clank.buffer = cBuf;
        const cbpf = ctx.createBiquadFilter();
        cbpf.type = 'bandpass';
        cbpf.frequency.value = 3800;
        cbpf.Q.value = 10;
        const cGain = ctx.createGain();
        cGain.gain.setValueAtTime(1.0, clankAt);
        cGain.gain.exponentialRampToValueAtTime(0.001, clankAt + 0.32);
        clank.connect(cbpf);
        cbpf.connect(cGain);
        cGain.connect(ctx.destination);
        clank.start(clankAt);
        clank.stop(clankAt + 0.5);

        // ── Ring resonance after clank ──
        const ring = ctx.createOscillator();
        const rGain = ctx.createGain();
        ring.frequency.value = 2600;
        ring.type = 'sine';
        rGain.gain.setValueAtTime(0.12, clankAt);
        rGain.gain.exponentialRampToValueAtTime(0.001, clankAt + 0.55);
        ring.connect(rGain);
        rGain.connect(ctx.destination);
        ring.start(clankAt);
        ring.stop(clankAt + 0.6);

      } catch (e) {}
    }

    function flip() {
      if (flipping) return;
      flipping = true;
      flipBtn.disabled = true;
      resultEl.innerHTML = '';

      const isHeads = Math.random() < 0.5;
      playCoinSound();

      // ── Phase 1 setup: start small ──
      coinMover.style.transition = 'none';
      coinMover.style.transform = 'translateY(0) scale(0.32)';
      coin.style.transition = 'none';
      coin.style.transform = 'rotateY(0deg)';
      void coinMover.offsetHeight; // force reflow

      // ── Phase 1: fly up + grow (0.55s, ease-in) ──
      const PHASE1_DUR = 550;
      const PHASE1_SPIN = 1440; // 4 rotations during launch
      coinMover.style.transition = `transform ${PHASE1_DUR}ms cubic-bezier(0.4, 0, 1, 1)`;
      coinMover.style.transform = 'translateY(-130vh) scale(2.2)';
      coin.style.transition = `transform ${PHASE1_DUR}ms linear`;
      coin.style.transform = `rotateY(${PHASE1_SPIN}deg)`;

      // ── Phase 2: land (0.52s, overshoot bounce easing) ──
      setTimeout(() => {
        const PHASE2_DUR = 520;
        // 3 more rotations after phase 1, land on correct face
        const finalDeg = PHASE1_SPIN + 1080 + (isHeads ? 0 : 180);
        coinMover.style.transition = `transform ${PHASE2_DUR}ms cubic-bezier(0.16, 1.4, 0.5, 1)`;
        coinMover.style.transform = 'translateY(0) scale(1)';
        coin.style.transition = `transform ${PHASE2_DUR}ms linear`;
        coin.style.transform = `rotateY(${finalDeg}deg)`;

        setTimeout(() => {
          const label = isHeads ? 'Heads!' : 'Tails!';
          const cls   = isHeads ? 'result-heads' : 'result-tails';
          resultEl.innerHTML = `<div class="result-text ${cls}">${label}</div>`;

          if (isHeads) headsCount++; else tailsCount++;
          headsEl.textContent = headsCount;
          tailsEl.textContent = tailsCount;
          tally.style.display = 'flex';

          flipping = false;
          flipBtn.disabled = false;
          flipBtn.textContent = 'Flip Again';
        }, PHASE2_DUR + 30);

      }, PHASE1_DUR + 40);
    }

    flipBtn.addEventListener('click', flip);
    coinWrap.addEventListener('click', flip);
  </script>

</body>
</html>
