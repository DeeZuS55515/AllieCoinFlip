<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Allie Coin Flip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      padding: 24px 16px;
      overflow: hidden;
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 900;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffe083, #e8b800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 48px;
      text-align: center;
      letter-spacing: 0.06em;
    }

    /* ── Coin ── */
    .coin-wrap {
      perspective: 700px;
      width: 220px;
      height: 220px;
      cursor: pointer;
      margin-bottom: 36px;
      flex-shrink: 0;
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.33, 0, 0.2, 1);
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.55));
    }

    .coin-face, .coin-back {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      user-select: none;
    }

    /* Heads — gold */
    .coin-face {
      background: radial-gradient(circle at 38% 32%, #fff5c0, #e8b800 42%, #a07000 80%, #6b4a00);
      box-shadow: inset 0 4px 10px rgba(255,255,200,0.6), inset 0 -5px 12px rgba(0,0,0,0.4);
    }

    /* Tails — silver */
    .coin-back {
      background: radial-gradient(circle at 62% 32%, #ffffff, #d0d0d0 42%, #808080 80%, #404040);
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.65), inset 0 -5px 12px rgba(0,0,0,0.35);
      transform: rotateY(180deg);
    }

    .coin-symbol {
      font-size: 88px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .coin-label {
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.22em;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .coin-face .coin-label { color: #5a3800; }
    .coin-back .coin-label { color: #2a2a2a; }

    /* ── Result ── */
    .result {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .result-text {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .result-heads { color: #e8b800; }
    .result-tails { color: #c0c0c0; }

    /* ── Button ── */
    .flip-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      padding: 14px 48px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #e8b800, #a07000);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(232,184,0,0.45);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.15s;
      text-transform: uppercase;
    }

    .flip-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(232,184,0,0.55);
    }

    .flip-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .flip-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    /* ── Tally ── */
    .tally {
      display: flex;
      gap: 28px;
      margin-top: 36px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    .tally span { font-weight: 700; font-size: 1.1rem; }
    .tally .heads-count { color: #e8b800; }
    .tally .tails-count { color: #c0c0c0; }

    /* ── Animation ── */
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

  <h1>Allie Coin Flip</h1>
  <div class="subtitle">tap the coin — or the button</div>

  <div class="coin-wrap" id="coinWrap">
    <div class="coin" id="coin">
      <div class="coin-face">
        <span class="coin-symbol">❤</span>
        <span class="coin-label">Heads</span>
      </div>
      <div class="coin-back">
        <span class="coin-symbol">★</span>
        <span class="coin-label">Tails</span>
      </div>
    </div>
  </div>

  <div class="result" id="result"></div>

  <button class="flip-btn" id="flipBtn">Flip</button>

  <div class="tally" id="tally" style="display:none">
    <div>❤ <span class="heads-count" id="headsCount">0</span></div>
    <div>★ <span class="tails-count" id="tailsCount">0</span></div>
  </div>

  <script>
    const coin     = document.getElementById('coin');
    const flipBtn  = document.getElementById('flipBtn');
    const resultEl = document.getElementById('result');
    const tally    = document.getElementById('tally');
    const headsEl  = document.getElementById('headsCount');
    const tailsEl  = document.getElementById('tailsCount');

    let flipping = false;
    let headsCount = 0, tailsCount = 0;
    let audioCtx = null;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playCoinSound() {
      try {
        const ctx = getCtx();
        const now = ctx.currentTime;

        // Spinning whoosh
        const osc = ctx.createOscillator();
        const oscGain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(160, now);
        osc.frequency.linearRampToValueAtTime(900, now + 0.35);
        osc.frequency.linearRampToValueAtTime(160, now + 0.65);
        oscGain.gain.setValueAtTime(0.06, now);
        oscGain.gain.linearRampToValueAtTime(0.1, now + 0.3);
        oscGain.gain.linearRampToValueAtTime(0, now + 0.65);
        osc.connect(oscGain);
        oscGain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.65);

        // Metallic clink on landing
        const clinkAt = now + 0.7;
        const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.25), ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const bpf = ctx.createBiquadFilter();
        bpf.type = 'bandpass';
        bpf.frequency.value = 4200;
        bpf.Q.value = 12;
        const clinkGain = ctx.createGain();
        clinkGain.gain.setValueAtTime(0.55, clinkAt);
        clinkGain.gain.exponentialRampToValueAtTime(0.001, clinkAt + 0.22);
        noise.connect(bpf);
        bpf.connect(clinkGain);
        clinkGain.connect(ctx.destination);
        noise.start(clinkAt);
        noise.stop(clinkAt + 0.25);

        // Ring decay
        const ring = ctx.createOscillator();
        const ringGain = ctx.createGain();
        ring.type = 'sine';
        ring.frequency.value = 3800;
        ringGain.gain.setValueAtTime(0.08, clinkAt);
        ringGain.gain.exponentialRampToValueAtTime(0.001, clinkAt + 0.35);
        ring.connect(ringGain);
        ringGain.connect(ctx.destination);
        ring.start(clinkAt);
        ring.stop(clinkAt + 0.35);
      } catch (e) {}
    }

    function flip() {
      if (flipping) return;
      flipping = true;
      flipBtn.disabled = true;
      resultEl.innerHTML = '';

      const isHeads = Math.random() < 0.5;
      playCoinSound();

      // Reset to 0 then spin
      coin.style.transition = 'none';
      coin.style.transform = 'rotateY(0deg)';
      void coin.offsetHeight;

      const spins = 6 + Math.floor(Math.random() * 3);
      const finalDeg = spins * 360 + (isHeads ? 0 : 180);
      coin.style.transition = 'transform 0.75s cubic-bezier(0.33, 0, 0.2, 1)';
      coin.style.transform = `rotateY(${finalDeg}deg)`;

      setTimeout(() => {
        const label = isHeads ? 'Heads!' : 'Tails!';
        const cls   = isHeads ? 'result-heads' : 'result-tails';
        resultEl.innerHTML = `<div class="result-text ${cls}">${label}</div>`;

        if (isHeads) headsCount++; else tailsCount++;
        headsEl.textContent = headsCount;
        tailsEl.textContent = tailsCount;
        tally.style.display = 'flex';

        flipping = false;
        flipBtn.disabled = false;
        flipBtn.textContent = 'Flip Again';
      }, 800);
    }

    flipBtn.addEventListener('click', flip);
    document.getElementById('coinWrap').addEventListener('click', flip);
  </script>

</body>
</html>
